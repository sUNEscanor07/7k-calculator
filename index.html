        function renderMainCategoryTabs() {
            const container = document.getElementById('main-category-tabs');
            if (!container) return;
            container.innerHTML = mainCategories.map(cat => {
                const isActive = cat === currentMainCategory ? 'active' : '';
                return `<button onclick="selectMainCategory('${cat}')" class="top-nav-btn ${isActive}">${cat}</button>`;
            }).join('');
        }

        function renderSubCategoryTabs() {
            const container = document.getElementById('collection-tabs');
            const subs = subCategories[currentMainCategory] || ['ทั้งหมด'];
            container.innerHTML = subs.map((cat, idx) => {
                const isActive = cat === currentSubCategory ? 'active' : '';
                const isSpecial = cat === 'ทั้งหมด';
                return `
                                                <div class="relative group">
                                                    <button onclick="selectSubCategory('${cat}')" class="sidebar-tab ${isActive}">
                                                        ${cat}
                                                    </button>
                                                    <div class="absolute right-1 top-1/2 -translate-y-1/2 flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        ${!isSpecial ? `
                                                            <button onclick="moveSubCategory('${cat}', -1)" class="text-amber-400 p-0.5 hover:text-white" title="ย้ายขึ้น" ${idx <= 1 ? 'style="display:none"' : ''}>
                                                                <i class="ph-bold ph-caret-up"></i>
                                                            </button>
                                                            <button onclick="moveSubCategory('${cat}', 1)" class="text-amber-400 p-0.5 hover:text-white" title="ย้ายลง" ${idx === subs.length - 1 ? 'style="display:none"' : ''}>
                                                                <i class="ph-bold ph-caret-down"></i>
                                                            </button>
                                                            <button onclick="deleteSubCategory('${cat}')" class="text-red-400 p-0.5 hover:text-red-600" title="ลบ">
                                                                <i class="ph-fill ph-trash"></i>
                                                            </button>
                                                        ` : ''}
                                                    </div>
                                                </div>
                                            `;
            }).join('');
        }

        function selectMainCategory(cat) {
            currentMainCategory = cat;
            currentSubCategory = 'ทั้งหมด';
            renderMainCategoryTabs();
            renderSubCategoryTabs();
            renderCollectionList();
            saveCollection();
        }

        function selectSubCategory(cat) {
            currentSubCategory = cat;
            renderSubCategoryTabs();
            renderCollectionList();
        }

        function addCategory() {
            const newCategory = prompt(`ชื่อหมวดหมู่ย่อยใหม่สำหรับ '${currentMainCategory}':`);
            if (newCategory && !subCategories[currentMainCategory].includes(newCategory)) {
                subCategories[currentMainCategory].push(newCategory);
                renderSubCategoryTabs();
                saveCollection();
            }
        }

        function deleteSubCategory(cat) {
            if (cat === 'ทั้งหมด') {
                alert('ไม่สามารถลบหมวดหมู่ ทั้งหมด ได้');
                return;
            }
            if (confirm(`คุณแน่ใจหรือไม่ที่จะลบหมวดหมู่ย่อย '${cat}'? อัศวินทั้งหมดในหมวดหมู่นี้จะถูกย้ายไปที่ 'ทั้งหมด'`)) {
                subCategories[currentMainCategory] = subCategories[currentMainCategory].filter(c => c !== cat);
                knightCollection.forEach(knight => {
                    if (knight.mainCategory === currentMainCategory && knight.subCategory === cat) {
                        knight.subCategory = 'ทั้งหมด';
                    }
                });
                currentSubCategory = 'ทั้งหมด';
                renderSubCategoryTabs();
                renderCollectionList();
                saveCollection();
            }
        }

        function moveSubCategory(cat, direction) {
            const subs = subCategories[currentMainCategory];
            const index = subs.indexOf(cat);
            if (index === -1) return;

            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= subs.length) return;

            // Swap elements
            [subs[index], subs[newIndex]] = [subs[newIndex], subs[index]];

            renderSubCategoryTabs();
            saveCollection();
        }

        function searchKnights(query) {
            searchQuery = query;
            renderCollectionList();
        }

        function clearSearch() {
            document.getElementById('collection-search').value = '';
            searchQuery = '';
            renderCollectionList();
        }

        function confirmAddKnight() {
            const knightName = document.getElementById('inp-name').value;
            if (!knightName) {
                alert('กรุณาใส่ชื่อตัวละครก่อนบันทึก');
                return;
            }

            // Show category selection modal
            openCategorySelectionModal();
        }

        function openCategorySelectionModal() {
            const modal = document.getElementById('category-selection-modal');
            const categoryList = document.getElementById('category-selection-list');

            let html = '';
            mainCategories.forEach(main => {
                html += `<div class="mb-4">
                                                <h4 class="text-amber-500 font-bold mb-2 border-b border-amber-500/30 pb-1">${main}</h4>
                                                <div class="grid grid-cols-2 gap-2">`;
                subCategories[main].forEach(sub => {
                    html += `<button onclick="selectCategoryAndAdd('${main}', '${sub}')" class="text-left p-2 text-sm rounded border border-slate-700 hover:bg-amber-700/30 hover:border-amber-500 transition-all text-white">
                                                    ${sub}
                                                </button>`;
                });
                html += `</div></div>`;
            });

            categoryList.innerHTML = html;
            modal.classList.remove('hidden');
        }

        function closeCategorySelectionModal() {
            document.getElementById('category-selection-modal').classList.add('hidden');
        }

        function selectCategoryAndAdd(main, sub) {
            addKnightToCollection(main, sub);
            closeCategorySelectionModal();
        }

        function addKnightToCollection(main, sub) {
            const newKnight = {
                name: document.getElementById('inp-name').value,
                atkType: document.getElementById('inp-atkType').value,
                classType: document.getElementById('inp-classType').value,
                image: document.getElementById('inp-image').value,
                lbLevel: document.getElementById('inp-lbLevel').value,
                lbChoices: JSON.parse(JSON.stringify(state.lbChoices || {})),
                potentialLevels: JSON.parse(JSON.stringify(state.potentialLevels || {})),
                selectedSet: state.selectedSet,
                selectedTier: state.selectedTier,
                state: JSON.parse(JSON.stringify(state)),
                mainCategory: main,
                subCategory: sub || 'ทั้งหมด'
            };
            knightCollection.push(newKnight);
            saveCollection();
            renderCollectionList();
            alert(`บันทึก '${newKnight.name}' ลงในสมุดเรียบร้อยแล้ว!`);
        }

        function loadKnight(index) {
            const knight = knightCollection[index];
            if (knight) {
                document.getElementById('inp-name').value = knight.name;
                document.getElementById('inp-atkType').value = knight.atkType;
                document.getElementById('inp-classType').value = knight.classType || 'none'; // Load class type
                document.getElementById('inp-image').value = knight.image;
                document.getElementById('inp-lbLevel').value = knight.lbLevel || 'none'; // Load LB level
                // Temporarily store custom base stats if they exist in the saved knight state
                const customBaseStats = knight.state && knight.state.base ? JSON.parse(JSON.stringify(knight.state.base)) : {};

                // Apply class base stats first
                applyClassBaseStats();

                // Then load the rest of the state, and apply custom base stats if they were present
                state = JSON.parse(JSON.stringify(knight.state));
                state.lbChoices = JSON.parse(JSON.stringify(knight.lbChoices || {})); // Load LB choices
                state.potentialLevels = JSON.parse(JSON.stringify(knight.potentialLevels || {})); // Load Potential levels
                state.selectedSet = knight.selectedSet || null;
                state.selectedTier = knight.selectedTier || 0;

                // Override class base stats with custom base stats if they were saved
                if (Object.keys(customBaseStats).length > 0) {
                    ALL_STATS.forEach(s => {
                        if (customBaseStats[s.id] !== undefined) {
                            state.base[s.id] = customBaseStats[s.id];
                        }
                    });
                }

                applyLbStats(); // Apply LB stats after loading state
                renderStatGroups();
                renderEquipments();
                renderSets();
                calculateAndRender();
                selectedKnightIndex = index;
                renderCollectionList();
                closeCollectionModal();
                alert(`โหลด '${knight.name}' สำเร็จ!`);
            }
        }

        function deleteKnight(index) {
            if (confirm(`คุณแน่ใจหรือไม่ที่จะลบ '${knightCollection[index].name}' ออกจากสมุด?`)) {
                knightCollection.splice(index, 1);
                selectedKnightIndex = -1;
                saveCollection();
                renderCollectionList();
            }
        }

        function moveKnight(index, direction) {
            const knight = knightCollection[index];
            if (!knight) return;

            // Find the next/previous knight in the SAME category
            const currentCategoryKnights = knightCollection.filter(k =>
                k.mainCategory === knight.mainCategory &&
                k.subCategory === knight.subCategory
            );

            const internalIndex = currentCategoryKnights.indexOf(knight);
            const targetInternalIndex = internalIndex + direction;

            if (targetInternalIndex < 0 || targetInternalIndex >= currentCategoryKnights.length) return;

            const targetKnight = currentCategoryKnights[targetInternalIndex];
            const targetGlobalIndex = knightCollection.indexOf(targetKnight);

            // Swap in global collection
            [knightCollection[index], knightCollection[targetGlobalIndex]] = [knightCollection[targetGlobalIndex], knightCollection[index]];

            saveCollection();
            renderCollectionList();
        }

        function saveCollection() {
            localStorage.setItem('knightCollection', JSON.stringify(knightCollection));
            localStorage.setItem('subCategories', JSON.stringify(subCategories));
            localStorage.setItem('mainCategories', JSON.stringify(mainCategories));
            localStorage.setItem('currentMainCategory', currentMainCategory);
        }

        function loadCollection() {
            const savedCollection = localStorage.getItem('knightCollection');
            const savedSubCategories = localStorage.getItem('subCategories');
            const savedMainCategories = localStorage.getItem('mainCategories');
            const savedMainCat = localStorage.getItem('currentMainCategory');

            if (savedCollection) knightCollection = JSON.parse(savedCollection);
            if (savedSubCategories) subCategories = JSON.parse(savedSubCategories);
            if (savedMainCategories) mainCategories = JSON.parse(savedMainCategories);
            if (savedMainCat) currentMainCategory = savedMainCat;

            // Remove "เซเว่นไนท์" if it exists in mainCategories
            const index = mainCategories.indexOf('เซเว่นไนท์');
            if (index !== -1) {
                mainCategories.splice(index, 1);
                delete subCategories['เซเว่นไนท์'];

                // Migrate knights in "เซเว่นไนท์" to "อื่นๆ"
                knightCollection.forEach(k => {
                    if (k.mainCategory === 'เซเว่นไนท์') {
                        k.mainCategory = 'อื่นๆ';
                        k.subCategory = 'ทั้งหมด';
                    }
                });

                if (currentMainCategory === 'เซเว่นไนท์') {
                    currentMainCategory = 'ปรับแต่ง';
                }
                saveCollection();
            }

            renderMainCategoryTabs();
            renderSubCategoryTabs();
            renderCollectionList();
        }

        function exportCollection() {
            const data = {
                knightCollection,
                subCategories,
                mainCategories,
                exportDate: new Date().toISOString(),
                version: "1.1"
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `7k_collection_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        let pendingImportData = null;

        function importCollection(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    pendingImportData = JSON.parse(e.target.result);
                    if (pendingImportData.knightCollection) {
                        openImportModeModal();
                    } else {
                        alert('ไฟล์สมุดอัศวินไม่ถูกต้อง! ไม่พบข้อมูล knightCollection');
                    }
                } catch (err) {
                    console.error(err);
                    alert('ไฟล์ไม่ถูกต้อง! กรุณาตรวจสอบรูปแบบไฟล์ JSON');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function openImportModeModal() {
            document.getElementById('import-mode-modal').classList.remove('hidden');
        }

        function closeImportModeModal() {
            document.getElementById('import-mode-modal').classList.add('hidden');
            pendingImportData = null;
        }

        function processImport(mode) {
            if (!pendingImportData) return;
            const data = pendingImportData;

            if (mode === 'overwrite') {
                if (!confirm('การเขียนทับจะลบข้อมูลอัศวินและหมวดหมู่เดิมของคุณทั้งหมด คุณแน่ใจหรือไม่?')) return;
                knightCollection = [];
                // Reset subCategories to defaults before merging
                subCategories = {
                    'ปรับแต่ง': ['ทั้งหมด'], 'พิเศษ': ['ทั้งหมด'], 'อัศวินทั่วไป': ['ทั้งหมด'],
                    'ทวีปอาร์เด': ['ทั้งหมด'], 'ทวีปไอชา': ['ทั้งหมด'], 'อื่นๆ': ['ทั้งหมด']
                };
                mainCategories = ['ปรับแต่ง', 'พิเศษ', 'อัศวินทั่วไป', 'ทวีปอาร์เด', 'ทวีปไอชา', 'อื่นๆ'];
            }

            // 1. Handle mainCategories
            if (data.mainCategories && Array.isArray(data.mainCategories)) {
                mainCategories = [...new Set([...mainCategories, ...data.mainCategories])];
            }

            // 2. Data migration and validation for knights
            const importedKnights = data.knightCollection.map(knight => {
                if (!knight.mainCategory && knight.category) knight.mainCategory = knight.category;
                if (!knight.mainCategory) knight.mainCategory = 'อื่นๆ';
                if (!knight.subCategory) knight.subCategory = 'ทั้งหมด';
                if (!mainCategories.includes(knight.mainCategory)) mainCategories.push(knight.mainCategory);
                return knight;
            });

            if (mode === 'merge') {
                knightCollection = [...knightCollection, ...importedKnights];
            } else {
                knightCollection = importedKnights;
            }

            // 3. Handle subCategories
            if (data.subCategories) {
                for (const mainCat in data.subCategories) {
                    if (!subCategories[mainCat]) {
                        subCategories[mainCat] = data.subCategories[mainCat];
                    } else {
                        subCategories[mainCat] = [...new Set([...subCategories[mainCat], ...data.subCategories[mainCat]])];
                    }
                }
            }

            // 4. Final consistency check
            knightCollection.forEach(k => {
                if (!subCategories[k.mainCategory]) subCategories[k.mainCategory] = ['ทั้งหมด'];
                if (!subCategories[k.mainCategory].includes(k.subCategory)) subCategories[k.mainCategory].push(k.subCategory);
            });

            saveCollection();
            renderMainCategoryTabs();
            renderSubCategoryTabs();
            renderCollectionList();
            closeImportModeModal();
            alert(mode === 'merge' ? 'รวมข้อมูลสมุดอัศวินสำเร็จ!' : 'เขียนทับข้อมูลสมุดอัศวินสำเร็จ!');
        }

        function resetCollection() {
            if (confirm('คุณแน่ใจหรือไม่ที่จะรีเซ็ตสมุดภาพอัศวินทั้งหมด? ข้อมูลอัศวินและหมวดหมู่ที่สร้างไว้จะถูกลบทั้งหมด (ไม่สามารถย้อนกลับได้)')) {
                knightCollection = [];
                mainCategories = ['ปรับแต่ง', 'พิเศษ', 'อัศวินทั่วไป', 'ทวีปอาร์เด', 'ทวีปไอชา', 'อื่นๆ'];
                subCategories = {
                    'ปรับแต่ง': ['ทั้งหมด'],
                    'พิเศษ': ['ทั้งหมด'],
                    'อัศวินทั่วไป': ['ทั้งหมด'],
                    'ทวีปอาร์เด': ['ทั้งหมด'],
                    'ทวีปไอชา': ['ทั้งหมด'],
                    'อื่นๆ': ['ทั้งหมด']
                };
                currentMainCategory = 'ปรับแต่ง';
                currentSubCategory = 'ทั้งหมด';

                localStorage.removeItem('knightCollection');
                localStorage.removeItem('subCategories');
                localStorage.removeItem('mainCategories');
                localStorage.removeItem('currentMainCategory');

                saveCollection();
                renderMainCategoryTabs();
                renderSubCategoryTabs();
                renderCollectionList();
                alert('รีเซ็ตสมุดภาพอัศวินเรียบร้อยแล้ว');
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${document.getElementById('inp-name').value || 'character'}_data.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const importedState = JSON.parse(e.target.result);

                    // Restore state
                    state = importedState;

                    // Restore UI from the loaded state
                    document.getElementById('inp-name').value = state.name || 'ตัวเปล่า';
                    document.getElementById('inp-atkType').value = state.atkType || 'กายภาพ';
                    document.getElementById('inp-classType').value = state.classType || 'none';
                    document.getElementById('inp-image').value = state.image || '';
                    document.getElementById('inp-lbLevel').value = state.lbLevel || 'none';

                    // Re-render all components to reflect the new state
                    renderStatGroups();
                    renderEquipments();
                    renderSets();
                    applyLbStats();
                    calculateAndRender();

                    alert('โหลดข้อมูลสำเร็จ!');
                } catch (error) {
                    console.error("Error importing data:", error);
                    alert('เกิดข้อผิดพลาดในการโหลดไฟล์ข้อมูลไม่ถูกต้อง');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset file input
        }

        function initialize() {
            state = {
                base: {}, lb: {}, potential: {},
                lbChoices: {},
                potentialLevels: {},
                equipments: EQUIP_CONFIG.map(eq => ({ ...eq, mainStats: [], subStats: [] })),
                selectedSet: null,
                selectedTier: 0
            };
            ALL_STATS.forEach(s => { state.base[s.id] = 0; state.lb[s.id] = 0; state.potential[s.id] = 0; });

            // Populate LB level dropdown
            const lbLevelSelect = document.getElementById("inp-lbLevel");
            lbLevelSelect.innerHTML = '<option value="none">เลือก LB Level</option>' +
                Object.keys(LB_STATS_CONFIG).map(level => `<option value="${level}">${level}</option>`).join('');
            renderStatGroups();
            renderEquipments();
            renderSets();
            calculateAndRender();
            ["inp-name", "inp-atkType", "inp-image", "inp-classType"].forEach(id => { document.getElementById(id).addEventListener("input", calculateAndRender); });
            // The sets-container change listener is now handled by the individual select elements within renderSets
            // document.getElementById("sets-container").addEventListener("change", calculateAndRender);
            document.getElementById("inp-classType").addEventListener("change", applyClassBaseStats);
            document.getElementById("inp-lbLevel").addEventListener("change", applyLbStats);
            loadCollection();
            applyClassBaseStats();
            applyLbStats();
        }

        function openCollectionModal() {
            document.getElementById('collection-modal').classList.remove('hidden');
            renderMainCategoryTabs();
            renderSubCategoryTabs();
            renderCollectionList();
        }

        function closeCollectionModal() {
            document.getElementById('collection-modal').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>

    <!-- Knight Collection Modal -->
    <div id="collection-modal" class="modal-overlay hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-4 z-50">
        <div class="book-container w-full max-w-7xl h-[90vh] flex flex-col overflow-hidden">
            <!-- Book Header -->
            <div class="flex justify-between items-center p-4 bg-[#3d2b1f] border-b border-[#d4a574]/30">
                <div class="flex items-center gap-4">
                    <h3 class="text-xl font-bold text-[#d4a574] flex items-center gap-2">
                        <i class="ph-fill ph-book-open"></i> สมุดภาพอัศวิน
                    </h3>
                    <div id="main-category-tabs" class="book-top-nav hidden md:flex">
                        <!-- Main categories will be rendered here -->
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="book-search-container">
                        <i class="ph-bold ph-magnifying-glass text-[#3d2b1f] mr-2"></i>
                        <input type="text" id="collection-search" placeholder="ค้นหาอัศวิน..." oninput="searchKnights(this.value)">
                        <button onclick="clearSearch()" class="text-[#3d2b1f] hover:text-red-600 ml-1"><i class="ph-bold ph-x"></i></button>
                    </div>
                    <button onclick="closeCollectionModal()" class="text-[#d4a574] hover:text-white"><i class="ph-bold ph-house text-2xl"></i></button>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <!-- Sidebar (Categories) -->
                <div class="w-48 book-sidebar p-2 flex flex-col border-r border-[#d4a574]/20">
                    <div id="collection-tabs" class="flex-1 overflow-y-auto space-y-1">
                        <!-- Categories will be rendered here -->
                    </div>
                    <div class="mt-2 pt-2 border-t border-[#d4a574]/20 space-y-2">
                        <button onclick="addCategory()" class="w-full py-2 px-3 text-xs bg-[#d4a574] text-[#3d2b1f] font-bold rounded hover:opacity-90 flex items-center justify-center gap-1">
                            <i class="ph-fill ph-plus"></i> เพิ่มหมวดหมู่
                        </button>
                        <button onclick="confirmAddKnight()" class="w-full py-2 px-3 text-xs bg-amber-500 text-black font-bold rounded hover:opacity-90 flex items-center justify-center gap-1">
                            <i class="ph-fill ph-plus-circle"></i> เพิ่มอัศวินปัจจุบัน
                        </button>
                        <div class="grid grid-cols-2 gap-1">
                            <button onclick="exportCollection()" class="py-2 text-[10px] bg-[#1a2847] text-white rounded border border-[#d4a574]/30 flex items-center justify-center gap-1">
                                <i class="ph-bold ph-download-simple"></i> ส่งออก
                            </button>
                            <label class="py-2 text-[10px] bg-[#1a2847] text-white rounded border border-[#d4a574]/30 flex items-center justify-center gap-1 cursor-pointer">
                                <i class="ph-bold ph-upload-simple"></i> นำเข้า
                                <input type="file" id="import-collection-file" class="hidden" accept=".json" onchange="importCollection(event)">
                            </label>
                        </div>
                        <button onclick="resetCollection()" class="w-full py-2 px-3 text-xs bg-red-900/50 text-red-200 border border-red-500/30 font-bold rounded hover:bg-red-800/50 flex items-center justify-center gap-1">
                            <i class="ph-fill ph-trash"></i> รีเซ็ตสมุดภาพ
                        </button>
                    </div>
                </div>

                <!-- Main Content (Hero Grid) -->
                <div class="flex-1 book-page p-6 overflow-y-auto">
                    <div id="knight-list-container">
                        <!-- Category Header will be rendered here -->
                        <div id="knight-list" class="flex flex-wrap gap-0 justify-start">
                            <!-- Hero cards will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Selection Modal -->
    <div id="category-selection-modal" class="modal-overlay hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="modal-content glass-panel rounded-xl w-full max-w-md flex flex-col max-h-[85vh]">
            <div class="modal-header flex justify-between items-center p-4 border-b border-slate-700 shrink-0">
                <h3 class="text-lg font-bold text-gradient flex items-center gap-2"><i class="ph-fill ph-folder-open"></i>เลือกหมวดหมู่</h3>
                <button onclick="closeCategorySelectionModal()" class="text-slate-400 hover:text-white"><i class="ph-bold ph-x text-2xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto custom-scrollbar">
                <div id="category-selection-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Import Mode Selection Modal -->
    <div id="import-mode-modal" class="modal-overlay hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-[60]">
        <div class="modal-content glass-panel rounded-xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold text-amber-500 mb-4 flex items-center gap-2">
                <i class="ph-fill ph-download-simple"></i> เลือกรูปแบบการนำเข้า
            </h3>
            <p class="text-slate-300 text-sm mb-6">คุณต้องการนำข้อมูลเข้าสู่สมุดภาพในรูปแบบใด?</p>

            <div class="space-y-3">
                <button onclick="processImport('merge')" class="w-full p-4 text-left rounded-lg border border-slate-700 hover:bg-amber-500/10 hover:border-amber-500 transition-all group">
                    <div class="font-bold text-white group-hover:text-amber-400 flex items-center gap-2">
                        <i class="ph-bold ph-intersect"></i> รวมข้อมูล (Merge)
                    </div>
                    <div class="text-xs text-slate-400 mt-1">เพิ่มอัศวินจากไฟล์ต่อจากข้อมูลเดิมที่มีอยู่ (ข้อมูลเดิมไม่หาย)</div>
                </button>

                <button onclick="processImport('overwrite')" class="w-full p-4 text-left rounded-lg border border-slate-700 hover:bg-red-500/10 hover:border-red-500 transition-all group">
                    <div class="font-bold text-white group-hover:text-red-400 flex items-center gap-2">
                        <i class="ph-bold ph-copy"></i> เขียนทับ (Overwrite)
                    </div>
                    <div class="text-xs text-slate-400 mt-1">ลบข้อมูลเดิมทั้งหมดและใช้ข้อมูลจากไฟล์นี้แทน</div>
                </button>
            </div>

            <div class="mt-6 flex justify-end">
                <button onclick="closeImportModeModal()" class="px-4 py-2 text-sm text-slate-400 hover:text-white">ยกเลิก</button>
            </div>
        </div>
    </div>

</body>
